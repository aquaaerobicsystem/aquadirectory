<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
   /* --- NEW: Loader CSS --- */
   #loader {
      border: 8px solid #f3f3f3; /* Light grey */
      border-top: 8px solid #3498db; /* Blue */
      border-radius: 50%;
      width: 60px;
      height: 60px;
      animation: spin 1.5s linear infinite;
      margin: auto; /* Center it */
      position: absolute; 
      top: 0;
      bottom: 0;
      left: 0;
      right: 0;
   }

   @keyframes spin {
     0% { transform: rotate(0deg); }
     100% { transform: rotate(360deg); }
   }
   /* --- END NEW --- */

   canvas {
      object-fit: contain;
      max-width: 100%;
      max-height: 100%;
      width: auto;
      height: auto;
      display: none; /* --- NEW: Hide canvas by default --- */
   }
  </style>
</head>
<body bgcolor="#fff">
<img id="first" src="First Floor.png" style="display: none;">
<img id="second" src="Second Floor.png" style="display: none;">

<center>
  <div id="loader"></div>

  <canvas id="myCanvas" width="800" height="552" style="border:0px solid #d3d3d3;">
  <script src="box.js"></script>
  </canvas>
</center>
</body>
</html>
